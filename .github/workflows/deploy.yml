##############################################################
# .github/workflows/deploy.yml
# CI/CD pipeline del english-bot:
#   - Pull Request → terraform fmt + validate + plan (sin apply)
#   - Push a main  → terraform plan + apply en el mismo job
#
# NOTA: plan y apply corren en el mismo job para que el ZIP
# generado por archive_file durante el plan siga disponible
# en el filesystem cuando se ejecuta el apply.
##############################################################

name: Deploy English Bot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION:  us-east-1
  TF_VERSION:  1.7.5
  WORKING_DIR: environments/dev

permissions:
  id-token:      write
  contents:      read
  pull-requests: write

jobs:
  # ── JOB 1: Plan (PR y push a main) ──────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar en AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EnglishBot

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Comentar Plan en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n... (truncado)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fallar si el plan tuvo errores
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── JOB 2: Apply (mismo runner que el plan para conservar el ZIP) ────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: dev

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar en AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EnglishBot-Apply

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      # El apply regenera el ZIP en el mismo runner — no depende de artefactos
      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform apply \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -input=false \
            -auto-approve