##############################################################
# .github/workflows/deploy.yml
# CI/CD pipeline del english-bot:
#   - Pull Request → terraform fmt + validate + plan (sin apply)
#   - Push a main  → terraform apply automático
##############################################################

name: Deploy English Bot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION:      us-east-1
  TF_VERSION:      1.7.5
  WORKING_DIR:     environments/dev

permissions:
  id-token:      write   # OIDC auth con AWS (sin access keys hardcodeadas)
  contents:      read
  pull-requests: write   # Para comentar el plan en el PR

jobs:
  # ── JOB 1: Validación y plan (corre en PR y en push a main) ──
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar en AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EnglishBot

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      # Publica el resultado del plan como comentario en el PR
      - name: Comentar Plan en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n... (truncado)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fallar si el plan tuvo errores
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Guarda el plan para usarlo en el job de apply
      - name: Subir plan como artefacto
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  # ── JOB 2: Apply (solo en push a main, después del plan exitoso) ──
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: dev   # Requiere aprobación manual si configuras "required reviewers" en GitHub

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar en AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EnglishBot-Apply

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Descargar plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
